<!DOCTYPE html>
<html>
<head>
    <title>CSS Presentation Scheme</title>

    <style>
        body {
            background-color: lightgray;
            font-family: Arial;
        }

        h1 {
            color: darkblue;
            text-align: center;
            text-decoration: underline;
        }

        p {
            color: black;
            font-size: 18px;
            line-height: 1.5;
        }

        .box {
            background-color: white;
            padding: 20px;
            margin: 20px;
            border: 2px solid black;
            border-radius: 10px;
        }

        .highlight {
            color: red;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h1>CSS Presentation Scheme</h1>

<div class="box">
    <p>
        This is a sample paragraph using CSS styling.
        CSS helps to control the <span class="highlight">layout and design</span> of web pages.
    </p>
</div>

</body>
</html>
