<!DOCTYPE html>
<html>
<head>
    <title>CSS Types Example</title>

    <!-- External CSS simulation (normally in style.css) -->
    <style>
        h2 {
            color: blue;
        }

        .external {
            background-color: lightyellow;
            padding: 10px;
        }
    </style>

</head>

<body>

<h1 style="color: green; text-align: center;">
    Inline CSS Example
</h1>

<h2>Internal CSS Example</h2>

<div class="external">
    This part uses internal (or external) CSS styling.
</div>

<p style="color: red; font-size: 18px;">
    This paragraph uses Inline CSS.
</p>

</body>
</html>
