<!DOCTYPE html>
<html>
<head>
    <title>Link Colors</title>

    <style>
        /* Unvisited link */
        a:link {
            color: blue;
        }

        /* Visited link */
        a:visited {
            color: purple;
        }

        /* Mouse hover */
        a:hover {
            color: red;
        }

        /* Active link */
        a:active {
            color: green;
        }
    </style>
</head>

<body>

<h1>Link Color Example</h1>

<a href="https://www.google.com" target="_blank">Google</a><br><br>
<a href="https://www.facebook.com" target="_blank">Facebook</a>

</body>
</html>
