<!DOCTYPE html>
<html>
<head>
    <title>HTML Lists</title>
</head>

<body>

<h1>Types of Lists</h1>

<!-- Ordered List -->
<h2>Ordered List</h2>
<ol>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
</ol>

<!-- Unordered List -->
<h2>Unordered List</h2>
<ul>
    <li>Apple</li>
    <li>Mango</li>
    <li>Banana</li>
</ul>

<!-- Definition List -->
<h2>Definition List</h2>
<dl>
    <dt>HTML</dt>
    <dd>HyperText Markup Language</dd>

    <dt>CSS</dt>
    <dd>Cascading Style Sheets</dd>
</dl>

</body>
</html>
