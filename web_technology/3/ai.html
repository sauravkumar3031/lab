<!DOCTYPE html>
<html>
<head>
    <title>Image Insertion</title>
</head>

<body>

<h1>Image Example</h1>

<!-- Simple image -->
<img src="image.jpg" alt="Sample Image" width="300" height="200">

<br><br>

<!-- Image with border -->
<img src="image.jpg" alt="Image with Border" width="250" height="180" border="5">

<br><br>

<!-- Image with alignment -->
<img src="image.jpg" alt="Aligned Image" width="250" height="180" align="right">

<p>
This text will wrap around the image because of alignment attribute.
</p>

</body>
</html>
