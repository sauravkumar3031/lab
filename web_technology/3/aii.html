<!DOCTYPE html>
<html>
<head>
    <title>Background Image</title>

    <style>
        body {
            background-image: url("background.jpg");
            background-size: cover;
            background-repeat: no-repeat;
        }

        h1, p {
            color: white;
            text-align: center;
        }
    </style>
</head>

<body>

<h1>Welcome to My Web Page</h1>
<p>This page has a background image.</p>

</body>
</html>
