<!DOCTYPE html>
<html>
<body>

<h2>Built-in Functions</h2>

<p id="out"></p>

<script>
let num = 25.67;

// Math built-in functions
let a = Math.sqrt(25);
let b = Math.round(num);
let c = Math.pow(2, 3);

// String built-in functions
let str = "Hello World";
let len = str.length;
let upper = str.toUpperCase();

document.getElementById("out").innerHTML =
"Square Root: " + a + "<br>" +
"Round: " + b + "<br>" +
"Power: " + c + "<br>" +
"Length: " + len + "<br>" +
"Uppercase: " + upper;
</script>

</body>
</html>
