<!DOCTYPE html>
<html>
<head>
    <title>Arithmetic Operations</title>
</head>

<body>

<h2>Arithmetic Operations</h2>

<p id="result"></p>

<script>
    // Variables
    let a = 10;
    let b = 5;

    // Arithmetic expressions
    let sum = a + b;
    let diff = a - b;
    let mul = a * b;
    let div = a / b;

    // Display result
    document.getElementById("result").innerHTML =
        "Sum = " + sum + "<br>" +
        "Difference = " + diff + "<br>" +
        "Multiplication = " + mul + "<br>" +
        "Division = " + div;
</script>

</body>
</html>
